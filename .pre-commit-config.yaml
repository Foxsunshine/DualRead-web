# ADR-A21 defense layer 2: client-side secret scan before commit lands.
# Public repo — but server-side env vars (e.g. Cloudflare Access AUD,
# Langfuse keys for the admin page) still don't belong in source.
#
# Bootstrap:
#   brew install pre-commit
#   pre-commit install
#
# Manual full-history scan:
#   gitleaks detect --source . --redact -v
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
